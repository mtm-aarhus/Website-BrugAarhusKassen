<div class="modal fade" id="faktureringModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          <i class="bi bi-pencil-square me-2"></i>Redigér fakturalinje
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form id="editForm" class="row g-3">

          <input type="hidden" id="edit-FakturaLinjeID">
          <input type="hidden" id="edit-Year">

          <!-- READ-ONLY KONTEKST -->
          <div class="col-md-3">
            <label class="form-label small text-secondary mb-1">Sag</label>
            <a id="edit-DeskproLink"
               class="form-control text-primary text-decoration-underline"
               style="padding-top:.375rem; padding-bottom:.375rem;"
               target="_blank"></a>
          </div>

          <div class="col-md-3">
            <label class="form-label small text-secondary mb-1">Periode</label>
            <input class="form-control" id="edit-Periode" disabled>
          </div>

          <div class="col-md-6">
            <label class="form-label small text-secondary mb-1">Firmanavn</label>
            <input class="form-control" id="edit-Firmanavn" disabled>
          </div>

          <div class="col-md-3">
            <label class="form-label small text-secondary mb-1">CVR</label>
            <div class="input-group">
              <input class="form-control" id="edit-CVR" disabled>
              <span class="input-group-text" id="edit-CVR-status" title="">
                <i class="bi bi-question-circle text-secondary"></i>
              </span>
            </div>
          </div>

          <div class="col-md-9">
            <label class="form-label small text-secondary mb-1">Adresse</label>
            <input class="form-control" id="edit-Adresse" disabled>
          </div>

          <div class="col-md-3">
            <label class="form-label small text-secondary mb-1">Zone</label>
            <input class="form-control" id="edit-Serveringszone" disabled>
          </div>

          <div class="col-md-9">
            <label class="form-label small text-secondary mb-1">Lokation</label>
            <input class="form-control" id="edit-Lokation" disabled>
          </div>

          <div class="col-12"><hr class="my-2"></div>

          <!-- EDITABLE -->
          <div class="col-md-3">
            <label class="form-label">Serveringsareal (m²)</label>
            <input type="number" step="0.01" class="form-control" id="edit-Serveringsareal">
          </div>

          <div class="col-md-3" id="facade-container">
            <label class="form-label">Facadelængde (m)</label>
            <input type="number" step="0.01" class="form-control" id="edit-Facadelaengde">
          </div>

          <div class="col-md-3">
            <label class="form-label">Pris (auto)</label>
            <input class="form-control fw-semibold" id="edit-Pris" readonly>
          </div>

          <div class="col-md-12">
            <label class="form-label">Kommentar</label>
            <textarea class="form-control" id="edit-Kommentar" rows="2"></textarea>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button id="btnResetData"      class="btn btn-outline-warning me-auto">
          <i class="bi bi-arrow-counterclockwise me-1"></i>Slet & gendan
        </button>
        <button id="btnFakturerIkke"   class="btn btn-outline-danger">
          <i class="bi bi-slash-circle me-1"></i>Fakturer ikke
        </button>
        <button id="btnSendTilFakturering" class="btn btn-success">
          <i class="bi bi-check2-circle me-1"></i>Godkend
        </button>
      </div>

      <div class="px-3 pb-2">
        <small class="text-secondary">
          <i class="bi bi-info-circle me-1"></i>
          Ændringer i grunddata (firmanavn, areal, lokation, mv.) skal foretages i Deskpro.
          Næste synkronisering opdaterer linjen her. Godkendelse låser linjen permanent.
        </small>
      </div>

    </div>
  </div>
</div>
